<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 2부제 A형 입간판 노랑 - 상호명 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#0f1729;color:#e2e8f0;font-size:14px;min-height:100vh}

/* 헤더 바 */
.site-header{padding:0;margin-bottom:200px;display:flex;align-items:center;gap:20px;flex-shrink:0;width:100%;max-width:800px}
.site-header .brand{font-size:26px;font-weight:900;color:#6366f1;letter-spacing:3px;text-transform:uppercase}
.site-header .product-name{font-size:28px;font-weight:700;color:#e2e8f0}
.site-header .sep-dot{color:#475569;font-size:18px}

/* ─── 데스크톱: 2컬럼 ─── */
.app-wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.app-layout{display:flex;flex:1;overflow:hidden}

/* 왼쪾: 시안 미리보기 */
.preview-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#0f1729;padding:32px;position:relative;min-width:0;overflow-y:auto}
.preview-panel canvas{width:100%;max-width:800px;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.4)}

/* 오른쪽: 컨트롤 패널 */
.control-panel{width:520px;flex-shrink:0;background:#1a2332;border-left:1px solid #2a3544;overflow-y:auto;display:flex;flex-direction:column}

/* 섹션 공통 */
.section{padding:24px 28px}
.section-title{font-size:15px;font-weight:700;letter-spacing:1.5px;color:#64748b;text-transform:uppercase;margin-bottom:18px}

/* 1. 시안 선택 */
.design-grid{display:flex;gap:8px;flex-wrap:wrap}
.design-thumb{width:90px;height:90px;border:2px solid #2a3544;border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.15s;position:relative}
.design-thumb:hover{border-color:#475569}
.design-thumb.selected{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.3);width:110px;height:110px}
.design-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.design-thumb .label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:#fff;font-size:13px;text-align:center;padding:3px 0;font-weight:700}
.design-thumb .check-badge{position:absolute;top:5px;right:5px;width:22px;height:22px;background:#6366f1;border-radius:50%;display:none;align-items:center;justify-content:center}
.design-thumb .check-badge svg{width:12px;height:12px;fill:#fff}
.design-thumb.selected .check-badge{display:flex}
.design-bar.single-mode .design-thumb{width:80px;height:80px;cursor:default;border-color:#6366f1}

/* 구분선 */
.sep{height:1px;background:#2a3544;margin:0}

/* 2. 입력 & 스타일 */
.ctrl-group{margin-bottom:22px}
.ctrl-group label{display:block;font-size:17px;font-weight:700;color:#94a3b8;margin-bottom:10px;letter-spacing:0.5px}
.ctrl-input{width:100%;padding:14px 18px;border:1px solid #2a3544;border-radius:10px;font-size:21px;font-family:inherit;background:#0f1729;color:#e2e8f0;text-align:left}
.ctrl-input::placeholder{color:#475569}
.ctrl-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}

/* 색상 칩 (원형) */
.color-row{display:flex;gap:10px;flex-wrap:wrap}
.color-chip{width:40px;height:40px;border-radius:50%;border:2px solid #2a3544;cursor:pointer;transition:all 0.12s;position:relative}
.color-chip:hover{transform:scale(1.12)}
.color-chip.sel{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.35)}
.color-chip.sel::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:2px solid #fff;opacity:0.8}

/* 3. 주문 정보 */
.auto-match-info{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:18px;color:#a5b4fc;line-height:1.6;display:flex;align-items:center;gap:12px}
.auto-match-info .match-icon{width:28px;height:28px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.auto-match-info .match-icon svg{width:14px;height:14px;fill:#fff}
.auto-match-info strong{color:#c7d2fe}

.order-row{margin-bottom:18px}
.order-row .row-label{display:block;font-size:15px;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase}
.order-input{width:100%;padding:12px 16px;border:1px solid #2a3544;border-radius:10px;font-size:20px;font-family:inherit;background:#0f1729;color:#e2e8f0}
.order-input::placeholder{color:#475569}
.order-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.order-input:disabled{background:#1e293b;color:#64748b;cursor:not-allowed}

/* 주문처 필 버튼 */
.channel-pills{display:flex;flex-wrap:wrap;gap:6px}
.channel-pill{padding:9px 18px;border:1px solid #2a3544;border-radius:20px;font-size:17px;font-weight:500;color:#94a3b8;cursor:pointer;transition:all 0.12s;background:transparent}
.channel-pill:hover{border-color:#475569;color:#e2e8f0}
.channel-pill.active{background:#6366f1;border-color:#6366f1;color:#fff}
.channel-pill input{display:none}

/* 주문코드 바 */
.order-code-bar{background:rgba(99,102,241,0.08);border-bottom:1px solid #2a3544;padding:12px 28px;font-size:17px;color:#a5b4fc;display:none;text-align:center}
.order-code-bar span{font-weight:700;color:#c7d2fe}

/* 발송 버튼 */
.btn-submit{width:100%;padding:20px;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);color:#fff;border:none;border-radius:12px;font-size:22px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:10px;transition:all 0.2s;letter-spacing:0.3px}
.btn-submit:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.warning-text{text-align:center;margin-top:12px;font-size:15px;color:#64748b;font-weight:400;line-height:1.5}

/* 완료 화면 */
.complete-screen{display:none;text-align:center;padding:60px 24px;flex:1;justify-content:center;align-items:center;flex-direction:column}
.complete-screen.show{display:flex}
.complete-screen .check-icon{font-size:72px;margin-bottom:20px}
.complete-screen h2{font-size:30px;font-weight:900;color:#6366f1;margin-bottom:14px}
.complete-screen p{font-size:20px;color:#94a3b8;line-height:1.7;margin-bottom:8px}
.complete-screen strong{color:#c7d2fe}

/* ─── 모바일 ─── */
@media(max-width:860px){
  .app-wrapper{height:100vh;overflow:hidden}
  .app-layout{flex-direction:column;flex:1;overflow:hidden}

  /* 모바일 헤더 (sticky 영역 내부) */
  .mobile-header{background:#111b2e;border-bottom:1px solid #2a3544;padding:10px 16px;display:flex;align-items:center;gap:10px}
  .mobile-header .brand{font-size:17px;font-weight:900;color:#6366f1;letter-spacing:2px;text-transform:uppercase}
  .mobile-header .product-name{font-size:18px;font-weight:700;color:#e2e8f0}
  .mobile-header .sep-dot{color:#475569;font-size:12px}

  /* PC 헤더 숨김 */
  .site-header{display:none}

  /* 고정 영역: 헤더 + 시안선택 + 시안미리보기 */
  .mobile-sticky{flex-shrink:0;background:#0f1729;border-bottom:1px solid #1e293b}
  .mobile-design-section{padding:10px 16px 6px;background:#1a2332}
  .mobile-design-section .section-title{font-size:13px;margin-bottom:8px}
  .mobile-design-section .design-grid{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .mobile-design-section .design-grid::-webkit-scrollbar{display:none}

  .preview-panel{padding:8px 16px 8px;height:auto;min-height:0;flex:none;background:#0f1729}
  .preview-panel canvas{max-width:100%;max-height:28vh;width:auto;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}

  /* 하단: 컨트롤만 스크롤 */
  .control-panel{width:100%;border-left:none;overflow-y:auto;flex:1;min-height:0}
  .section{padding:16px}
  /* 모바일에서 시안선택 섹션은 sticky 영역으로 이동됨 */
  #designSection{display:none}
  .design-thumb{width:56px;height:56px;flex-shrink:0}
  .design-thumb.selected{width:78px;height:78px}
  .design-bar.single-mode .design-thumb{width:70px;height:70px}
  .color-chip{width:30px;height:30px}
  .ctrl-input{font-size:16px}
}

/* 아주 작은 화면 */
@media(max-width:400px){
  .design-thumb{width:52px;height:52px}
  .channel-pills{gap:4px}
  .channel-pill{padding:6px 10px;font-size:11px}
}
</style>
</head>
<body>

<div class="app-wrapper">

<div class="app-layout" id="appLayout">

  <!-- 모바일 전용: 헤더 + 시안선택 + 미리보기 고정 영역 -->
  <div class="mobile-sticky" id="mobileSticky" style="display:none">
    <div class="mobile-header">
      <span class="brand">HANASIGNMALL</span>
      <span class="sep-dot">●</span>
      <span class="product-name">차량 2부제 A형 입간판 노랑</span>
    </div>
    <div class="mobile-design-section">
      <div class="section-title">시안 선택</div>
      <div class="design-grid" id="mobileDesignBar"></div>
    </div>
    <div class="preview-panel" id="mobilePreview">
      <canvas id="mobileCanvas"></canvas>
    </div>
  </div>

  <!-- 왼쪽(데스크톱): 시안 미리보기 -->
  <div class="preview-panel" id="previewPanel">
    <div class="site-header">
      <span class="brand">HANASIGNMALL</span>
      <span class="sep-dot">●</span>
      <span class="product-name">차량 2부제 A형 입간판 노랑</span>
    </div>
    <canvas id="editorCanvas"></canvas>
  </div>

  <!-- 오른쪽(데스크톱) / 하단(모바일): 컨트롤 -->
  <div class="control-panel" id="controlPanel">

    <!-- 주문코드 바 -->
    <div class="order-code-bar" id="orderCodeBar">
      주문코드 <span id="orderCodeDisplay"></span> 자동연결
    </div>

    <!-- 1. 시안 선택 -->
    <div class="section" id="designSection">
      <div class="section-title">1. 시안 선택</div>
      <div class="design-grid" id="designBar"></div>
    </div>

    <div class="sep"></div>

    <!-- 2. 입력 & 스타일 -->
    <div class="section">
      <div class="section-title">2. 텍스트 입력</div>
      <div class="ctrl-group">
        <label>상호/기관명</label>
        <input class="ctrl-input" type="text" id="inputText" placeholder="예: 시그널 스튜디오 카페" maxlength="20">
      </div>
      <div class="ctrl-group">
        <label>글자 색상</label>
        <div class="color-row" id="colorRow"></div>
      </div>
    </div>

    <div class="sep"></div>

    <!-- 3. 주문 정보 -->
    <div class="section" id="orderSection">
      <div class="section-title">3. 주문 정보</div>

      <!-- 자동매칭 안내 -->
      <div class="auto-match-info" id="autoMatchInfo" style="display:none">
        <div class="match-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
        <div><strong>주문 자동연결</strong><br>주문 정보가 자동으로 매칭되어 별도 입력이 필요 없습니다.</div>
      </div>

      <!-- 주문처 -->
      <div class="order-row" id="channelRow">
        <div class="row-label">주문 채널</div>
        <div class="channel-pills" id="channelPills">
          <label class="channel-pill active"><input type="radio" name="orderChannel" value="hanasignmall.kr" checked>하나사인몰.kr</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="hanasignmall.com">하나사인몰.com</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="smartstore">스마트스토어</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="gmarket">G마켓</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="auction">옥션</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="coupang">쿠팡</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="11st">11번가</label>
          <label class="channel-pill"><input type="radio" name="orderChannel" value="phone">전화주문</label>
        </div>
      </div>

      <!-- 주문자 / 연락처 (2열) -->
      <div style="display:flex;gap:12px" id="namePhoneRow">
        <div class="order-row" id="nameRow" style="flex:1">
          <div class="row-label">주문자명</div>
          <input class="order-input" type="text" id="nameInput" placeholder="홍길동">
        </div>
        <div class="order-row" id="phoneRow" style="flex:1">
          <div class="row-label">연락처</div>
          <input class="order-input" type="tel" id="phoneInput" placeholder="010-1234-5678">
        </div>
      </div>

      <div class="warning-text">주문제작 상품입니다. 발송 후 수정이 어렵습니다.</div>
      <button class="btn-submit" id="btnSubmit">시안 확정 및 주문 완료 &rarr;</button>
    </div>

    <!-- 완료 화면 -->
    <div class="complete-screen" id="completeScreen">
      <div class="check-icon">&#x2705;</div>
      <h2>시안 발송 완료</h2>
      <p id="completeMsg"></p>
      <p style="font-size:12px;color:#475569;margin-top:24px">이 페이지를 닫으셔도 됩니다.</p>
    </div>

  </div>
</div>
</div>

<script>
/* ───── 설정 ───── */
const IMG_BASE = 'https://ad.hanasm.kr/gsfiles_room/';
const DESIGN_IMAGES = {
  "des01": IMG_BASE + "/2026/04/02/97635dc3a9299a50b74d4ae1b572a3bfe6466a9a.png",
  "des02": IMG_BASE + "/2026/04/03/33bacd2a6cdf5442e484137f72b722c3a35c2fd6.png",
  "des03": IMG_BASE + "/2026/04/02/7c2cf70fd002267ba2b45a9b09528462b730e342.png",
  "des04": IMG_BASE + "/2026/04/02/a1cc3eb80313170e09aa0d3c9eb13ae6912917b9.png",
  "des05": IMG_BASE + "/2026/04/02/95e90a4d0260c82d551e181374dd1134444a7f2b.png",
  "des06": IMG_BASE + "/2026/04/02/ba7e9e0c2a7ee4ed1aeb585ebe5bd4777dc8bb67.png"
};

const DESIGNS = [
  { id:'des01', name:'01', src: DESIGN_IMAGES['des01'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des02', name:'02', src: DESIGN_IMAGES['des02'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des03', name:'03', src: DESIGN_IMAGES['des03'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des04', name:'04', src: DESIGN_IMAGES['des04'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des05', name:'05', src: DESIGN_IMAGES['des05'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des06', name:'06', src: DESIGN_IMAGES['des06'], defaultFontSize:22, defaultColor:'#1a1a1a' },
];

const FIXED_FONT = 'Noto Sans KR';
const FIXED_FONT_SIZE = 35;
const FIXED_FONT_WEIGHT = 700;
const STRETCH_PX = 40;
const BOTTOM_PAD_PX = 30;

const COLORS = [
  {n:'검정',v:'#1a1a1a'},{n:'흰색',v:'#ffffff'},{n:'빨강',v:'#CC0000'},{n:'파랑',v:'#003399'},
  {n:'노랑',v:'#FFD700'},{n:'초록',v:'#006633'},{n:'주황',v:'#FF6600'},{n:'갈색',v:'#663300'},
];

/* ───── 상태 ───── */
let selectedDesign = null;
let currentColor = '#1a1a1a';
let loadedImages = {};

/* ───── URL 파라미터 ───── */
const urlParams = new URLSearchParams(window.location.search);
const ORDER_CODE = urlParams.get('order_code') || '';
const PARAM_DESIGN = urlParams.get('design') || '';
const PARAM_CHANNEL = urlParams.get('channel') || '';
const PARAM_NAME = urlParams.get('name') || '';
const PARAM_PHONE = urlParams.get('phone') || '';
const IS_AUTO_MODE = !!ORDER_CODE;

/* ───── 이미지 프리로드 ───── */
function preloadImages(designList) {
  return Promise.all(designList.map(d => new Promise(r => {
    const img = new Image();
    img.onload = () => { loadedImages[d.id] = img; r(); };
    img.onerror = () => r();
    img.src = d.src;
  })));
}

/* ───── 캔버스 렌더링 ───── */
function renderDesign(canvas, des, mainText, textColor) {
  const img = loadedImages[des.id];
  if (!img) return;

  const iw = img.naturalWidth;
  const ih = img.naturalHeight;
  const lastOpaqueY = 939;
  const stretchH = Math.round(ih * (STRETCH_PX / 1000));
  const bottomPad = Math.round(ih * (BOTTOM_PAD_PX / 1000));
  const cropH = lastOpaqueY + 1;
  const totalH = cropH + stretchH + bottomPad;

  canvas.width = iw;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, iw, totalH);
  ctx.drawImage(img, 0, 0, iw, cropH, 0, 0, iw, cropH);

  for (let y = 0; y < stretchH; y++) {
    ctx.drawImage(img, 0, lastOpaqueY, iw, 1, 0, cropH + y, iw, 1);
  }

  const textCenterY = cropH + stretchH * 0.15;
  const hasText = mainText && mainText.trim();

  if (!hasText) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.font = `500 ${Math.round(stretchH * 0.45)}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('상호/기관명', iw * 0.5, textCenterY);
  } else {
    const scaledFS = Math.round(FIXED_FONT_SIZE * (iw / 1000));
    ctx.font = `${FIXED_FONT_WEIGHT} ${scaledFS}px "${FIXED_FONT}",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textColor || des.defaultColor;
    ctx.fillText(mainText, iw * 0.5, textCenterY, iw * 0.85);
  }
}

/* ───── 시안 바 초기화 ───── */
function initDesignBar(designList) {
  const bar = document.getElementById('designBar');
  bar.innerHTML = '';

  if (designList.length === 1) {
    document.getElementById('designSection').querySelector('.design-grid').classList.add('single-mode');
  }

  designList.forEach(d => {
    const thumb = document.createElement('div');
    thumb.className = 'design-thumb' + (d.id === selectedDesign.id ? ' selected' : '');
    thumb.dataset.id = d.id;
    thumb.innerHTML = `<img src="${DESIGN_IMAGES[d.id]}"><div class="label">${d.name}</div><div class="check-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>`;

    if (designList.length > 1) {
      thumb.addEventListener('click', () => {
        selectedDesign = d;
        currentColor = d.defaultColor;
        document.querySelectorAll('.design-thumb').forEach(el => el.classList.toggle('selected', el.dataset.id === d.id));
        document.querySelectorAll('.color-chip').forEach(e => e.classList.toggle('sel', e.dataset.c === currentColor));
        updateEditor();
      });
    }
    bar.appendChild(thumb);
  });
}

/* ───── 색상 팔레트 ───── */
function initColorRow() {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (c.v === currentColor ? ' sel' : '');
    chip.style.background = c.v;
    if (c.v === '#ffffff') chip.style.borderColor = '#555';
    chip.title = c.n;
    chip.dataset.c = c.v;
    chip.addEventListener('click', () => {
      currentColor = c.v;
      document.querySelectorAll('#colorRow .color-chip').forEach(e => e.classList.toggle('sel', e.dataset.c === c.v));
      updateEditor();
    });
    row.appendChild(chip);
  });
}

/* ───── 채널 필 버튼 ───── */
function initChannelPills() {
  document.querySelectorAll('.channel-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.channel-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      pill.querySelector('input').checked = true;
    });
  });
}

/* ───── 모바일 감지 ───── */
function isMobile() { return window.innerWidth <= 860; }

/* ───── 모바일 시안바 초기화 ───── */
function initMobileDesignBar(designList) {
  const bar = document.getElementById('mobileDesignBar');
  if (!bar) return;
  bar.innerHTML = '';
  designList.forEach(d => {
    const thumb = document.createElement('div');
    thumb.className = 'design-thumb' + (d.id === selectedDesign.id ? ' selected' : '');
    thumb.dataset.id = d.id;
    thumb.innerHTML = `<img src="${DESIGN_IMAGES[d.id]}"><div class="label">${d.name}</div><div class="check-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>`;
    if (designList.length > 1) {
      thumb.addEventListener('click', () => {
        selectedDesign = d;
        currentColor = d.defaultColor;
        document.querySelectorAll('.design-thumb').forEach(el => el.classList.toggle('selected', el.dataset.id === d.id));
        document.querySelectorAll('.color-chip').forEach(e => e.classList.toggle('sel', e.dataset.c === currentColor));
        updateEditor();
      });
    }
    bar.appendChild(thumb);
  });
}

/* ───── 모바일/PC 레이아웃 토글 ───── */
function updateLayout() {
  const mobile = isMobile();
  const mobileSticky = document.getElementById('mobileSticky');
  const pcPreview = document.getElementById('previewPanel');
  if (mobile) {
    mobileSticky.style.display = '';
    pcPreview.style.display = 'none';
  } else {
    mobileSticky.style.display = 'none';
    pcPreview.style.display = '';
  }
}

/* ───── 에디터 업데이트 ───── */
function updateEditor() {
  if (!selectedDesign) return;
  const text = document.getElementById('inputText').value;
  // PC 캔버스
  renderDesign(document.getElementById('editorCanvas'), selectedDesign, text, currentColor);
  // 모바일 캔버스
  const mc = document.getElementById('mobileCanvas');
  if (mc) renderDesign(mc, selectedDesign, text, currentColor);
}

/* ───── 발송 처리 ───── */
function submitOrder() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    alert('상호/기관명을 입력해주세요.');
    document.getElementById('inputText').focus();
    return;
  }

  let orderName, phone, channel;

  if (IS_AUTO_MODE) {
    orderName = PARAM_NAME || '(자동매칭)';
    phone = PARAM_PHONE || '(자동매칭)';
    channel = PARAM_CHANNEL || '(자동매칭)';
  } else {
    orderName = document.getElementById('nameInput').value.trim();
    if (!orderName) {
      alert('주문자명을 입력해주세요.');
      document.getElementById('nameInput').focus();
      return;
    }
    phone = document.getElementById('phoneInput').value.trim();
    if (!phone) {
      alert('연락처를 입력해주세요.');
      document.getElementById('phoneInput').focus();
      return;
    }
    channel = document.querySelector('input[name="orderChannel"]:checked').value;
  }

  const canvas = document.getElementById('editorCanvas');
  const imgData = canvas.toDataURL('image/png');

  const payload = {
    order_code: ORDER_CODE || null,
    design: selectedDesign.name,
    design_id: selectedDesign.id,
    text: text,
    color: currentColor,
    channel: channel,
    orderName: orderName,
    phone: phone,
    imageSize: Math.round(imgData.length / 1024) + 'KB',
    timestamp: new Date().toISOString()
  };

  // TODO: 서버 발송 연동
  console.log('[발송 데이터]', payload);

  // 완료 화면 표시
  document.querySelectorAll('#designSection, #orderSection, .sep').forEach(el => el.style.display = 'none');
  document.getElementById('orderCodeBar').style.display = 'none';
  const complete = document.getElementById('completeScreen');
  complete.classList.add('show');
  document.getElementById('completeMsg').innerHTML =
    `시안 <strong>${selectedDesign.name}</strong>번 / 상호명 <strong>${text}</strong><br>` +
    (IS_AUTO_MODE ? `주문코드 <strong>${ORDER_CODE}</strong>로 자동 연결되었습니다.` : `주문자 <strong>${orderName}</strong> / 연락처 <strong>${phone}</strong>`);

  alert('시안이 발송되었습니다.');
}

/* ───── 자동매칭 모드 ───── */
function setupAutoMode() {
  if (!IS_AUTO_MODE) return;

  document.getElementById('orderCodeBar').style.display = 'block';
  document.getElementById('orderCodeDisplay').textContent = ORDER_CODE;
  document.getElementById('autoMatchInfo').style.display = 'flex';
  document.getElementById('channelRow').style.display = 'none';

  if (PARAM_NAME) {
    document.getElementById('nameInput').value = PARAM_NAME;
    document.getElementById('nameInput').disabled = true;
  } else {
    document.getElementById('nameRow').style.display = 'none';
  }

  if (PARAM_PHONE) {
    document.getElementById('phoneInput').value = PARAM_PHONE;
    document.getElementById('phoneInput').disabled = true;
  } else {
    document.getElementById('phoneRow').style.display = 'none';
  }

  if (!PARAM_NAME && !PARAM_PHONE) {
    document.getElementById('namePhoneRow').style.display = 'none';
  }

  if (PARAM_CHANNEL) {
    const radio = document.querySelector(`input[name="orderChannel"][value="${PARAM_CHANNEL}"]`);
    if (radio) {
      radio.checked = true;
      document.querySelectorAll('.channel-pill').forEach(p => p.classList.remove('active'));
      radio.closest('.channel-pill').classList.add('active');
    }
  }
}

/* ───── 초기화 ───── */
document.addEventListener('DOMContentLoaded', async () => {
  let activeDesigns = DESIGNS;
  if (PARAM_DESIGN) {
    const match = DESIGNS.filter(d => d.id === PARAM_DESIGN);
    if (match.length > 0) activeDesigns = match;
  }

  selectedDesign = activeDesigns[0];
  currentColor = selectedDesign.defaultColor;

  await preloadImages(activeDesigns);
  initDesignBar(activeDesigns);
  initMobileDesignBar(activeDesigns);
  initColorRow();
  initChannelPills();
  setupAutoMode();
  updateLayout();
  window.addEventListener('resize', updateLayout);

  document.getElementById('inputText').addEventListener('input', updateEditor);
  document.getElementById('btnSubmit').addEventListener('click', submitOrder);

  updateEditor();
  setTimeout(() => document.getElementById('inputText').focus(), 200);
});
</script>
</body>
</html>
