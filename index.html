<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 2부제 A형 입간판 노랑 - 상호명 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f7f8fa;color:#333;font-size:14px}

/* 헤더 */
.page-header{background:#fff;border-bottom:1px solid #e0e0e0;padding:20px 0 16px;text-align:center}
.page-header h1{font-size:20px;font-weight:900;color:#1a1a1a;margin-bottom:4px}
.page-header p{font-size:13px;color:#666;font-weight:400}
.order-info-bar{background:#eef6ff;border-bottom:1px solid #bdd6f0;padding:10px 20px;text-align:center;font-size:13px;color:#1a365d;font-weight:500;display:none}
.order-info-bar span{font-weight:700;color:#2563eb}

/* 시안 선택 바 */
.design-bar{background:#fff;border-bottom:1px solid #eee;padding:16px 0}
.design-bar-inner{max-width:900px;margin:0 auto;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 16px}
.design-thumb{width:80px;height:80px;border:2px solid #e0e0e0;border-radius:8px;overflow:hidden;cursor:pointer;transition:all 0.15s;position:relative}
.design-thumb:hover{border-color:#888}
.design-thumb.selected{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.2)}
.design-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.design-thumb .label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;text-align:center;padding:2px 0;font-weight:700}
.design-bar.single-mode .design-bar-inner{justify-content:center}
.design-bar.single-mode .design-thumb{width:100px;height:100px;cursor:default;border-color:#2563eb}

/* 메인 영역 */
.main-area{max-width:600px;margin:0 auto;padding:0 16px 24px}
.editor-card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;margin-top:16px}

/* 캔버스 영역 */
.canvas-section{padding:20px 20px 12px;text-align:center}
.canvas-section canvas{width:100%;max-width:460px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa}

/* 입력 섹션 */
.input-section{padding:0 20px 20px}
.ctrl-group{margin-bottom:16px}
.ctrl-group label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:6px}
.ctrl-input{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:16px;font-family:inherit;text-align:center}
.ctrl-input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}

/* 색상 선택 */
.color-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.color-chip{width:36px;height:36px;border-radius:6px;border:2px solid #ddd;cursor:pointer;transition:all 0.12s}
.color-chip:hover{transform:scale(1.12)}
.color-chip.sel{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.3)}

/* 구분선 */
.divider{height:1px;background:#e5e7eb;margin:0}

/* 하단 주문 섹션 */
.order-section{padding:20px}
.order-row{margin-bottom:14px}
.order-row label.row-label{display:block;font-size:13px;font-weight:700;color:#555;margin-bottom:6px}
.order-input{width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit}
.order-input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.order-input:disabled{background:#f3f4f6;color:#9ca3af;cursor:not-allowed}

/* 주문처 라디오 */
.radio-group{display:flex;flex-wrap:wrap;gap:6px 12px}
.radio-group label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;padding:4px 0}
.radio-group input[type="radio"]{accent-color:#2563eb;width:16px;height:16px}

/* 자동매칭 안내 */
.auto-match-info{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#166534;line-height:1.6}
.auto-match-info strong{color:#15803d}

/* 버튼 */
.btn-submit{width:100%;padding:16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:8px;transition:background 0.15s}
.btn-submit:hover{background:#1d4ed8}
.btn-submit:disabled{background:#93c5fd;cursor:not-allowed}

/* 경고문 */
.warning-text{text-align:center;margin-top:12px;padding:10px;font-size:12px;color:#b91c1c;font-weight:500;line-height:1.6}

/* 완료 화면 */
.complete-screen{display:none;text-align:center;padding:40px 20px}
.complete-screen .check-icon{font-size:64px;margin-bottom:16px}
.complete-screen h2{font-size:22px;font-weight:900;color:#059669;margin-bottom:8px}
.complete-screen p{font-size:14px;color:#666;line-height:1.7;margin-bottom:6px}

/* 모바일 최적화 */
@media(max-width:768px){
  .page-header{padding:16px 0 12px;position:sticky;top:0;z-index:100;background:#fff}
  .design-bar{position:sticky;top:56px;z-index:99;background:#fff}
  .order-info-bar{position:sticky;top:56px;z-index:98}
  .design-bar + .order-info-bar{top:113px}
  .canvas-section{padding:12px 12px 8px}
  .input-section{padding:0 12px 16px}
  .order-section{padding:16px 12px}
  .design-thumb{width:64px;height:64px}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="page-header">
  <h1>차량 2부제 A형 입간판 노랑</h1>
  <p id="headerDesc">시안 선택 후 상호명을 입력해주세요</p>
</div>

<!-- 주문 자동매칭 정보 바 -->
<div class="order-info-bar" id="orderInfoBar">
  주문코드 <span id="orderCodeDisplay"></span> 으로 연결되었습니다
</div>

<!-- 시안 선택 바 -->
<div class="design-bar" id="designBarWrap">
  <div class="design-bar-inner" id="designBar"></div>
</div>

<!-- 메인 영역 -->
<div class="main-area">
  <div class="editor-card" id="editorCard">

    <!-- 시안 미리보기 -->
    <div class="canvas-section">
      <canvas id="editorCanvas"></canvas>
    </div>

    <!-- 입력 영역: 텍스트 + 색상만 -->
    <div class="input-section">
      <div class="ctrl-group">
        <label>상호/기관명</label>
        <input class="ctrl-input" type="text" id="inputText" placeholder="예: 하나아파트" maxlength="20">
      </div>
      <div class="ctrl-group">
        <label>글자 색상</label>
        <div class="color-row" id="colorRow"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 주문 정보 -->
    <div class="order-section" id="orderSection">

      <!-- 자동매칭 안내 (주문코드 있을 때만 표시) -->
      <div class="auto-match-info" id="autoMatchInfo" style="display:none">
        <strong>자동 연결됨</strong> — 주문 정보가 자동으로 연결되어 별도 입력이 필요 없습니다.
      </div>

      <!-- 주문처 (주문코드 없을 때만 표시) -->
      <div class="order-row" id="channelRow">
        <label class="row-label">주문처</label>
        <div class="radio-group">
          <label><input type="radio" name="orderChannel" value="hanasignmall.kr" checked>Hanasignmall.kr</label>
          <label><input type="radio" name="orderChannel" value="hanasignmall.com">Hanasignmall.com</label>
          <label><input type="radio" name="orderChannel" value="smartstore">스마트스토어</label>
          <label><input type="radio" name="orderChannel" value="gmarket">G마켓</label>
          <label><input type="radio" name="orderChannel" value="auction">옥션</label>
          <label><input type="radio" name="orderChannel" value="coupang">쿠팡</label>
          <label><input type="radio" name="orderChannel" value="11st">11번가</label>
          <label><input type="radio" name="orderChannel" value="phone">전화주문</label>
        </div>
      </div>

      <!-- 주문자명 -->
      <div class="order-row" id="nameRow">
        <label class="row-label">주문자명</label>
        <input class="order-input" type="text" id="nameInput" placeholder="주문자명을 입력해주세요">
      </div>

      <!-- 연락처 -->
      <div class="order-row" id="phoneRow">
        <label class="row-label">연락처</label>
        <input class="order-input" type="tel" id="phoneInput" placeholder="010-0000-0000">
      </div>

      <button class="btn-submit" id="btnSubmit">시안 확정 및 발송하기</button>
      <div class="warning-text">발송 후에는 수정이 어렵사오니 반드시 심사숙고해주셔서 발송 바랍니다.</div>
    </div>

    <!-- 완료 화면 -->
    <div class="complete-screen" id="completeScreen">
      <div class="check-icon">✅</div>
      <h2>시안 발송 완료</h2>
      <p id="completeMsg"></p>
      <p style="font-size:13px;color:#999;margin-top:20px">이 페이지를 닫으셔도 됩니다.</p>
    </div>

  </div>
</div>

<script>
/* ───── 설정 ───── */
const IMG_BASE = 'https://ad.hanasm.kr/gsfiles_room/';
const DESIGN_IMAGES = {
  "des01": IMG_BASE + "/2026/04/02/97635dc3a9299a50b74d4ae1b572a3bfe6466a9a.png",
  "des02": IMG_BASE + "/2026/04/03/33bacd2a6cdf5442e484137f72b722c3a35c2fd6.png",
  "des03": IMG_BASE + "/2026/04/02/7c2cf70fd002267ba2b45a9b09528462b730e342.png",
  "des04": IMG_BASE + "/2026/04/02/a1cc3eb80313170e09aa0d3c9eb13ae6912917b9.png",
  "des05": IMG_BASE + "/2026/04/02/95e90a4d0260c82d551e181374dd1134444a7f2b.png",
  "des06": IMG_BASE + "/2026/04/02/ba7e9e0c2a7ee4ed1aeb585ebe5bd4777dc8bb67.png"
};

const DESIGNS = [
  { id:'des01', name:'01', src: DESIGN_IMAGES['des01'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des02', name:'02', src: DESIGN_IMAGES['des02'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des03', name:'03', src: DESIGN_IMAGES['des03'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des04', name:'04', src: DESIGN_IMAGES['des04'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des05', name:'05', src: DESIGN_IMAGES['des05'], defaultFontSize:22, defaultColor:'#1a1a1a' },
  { id:'des06', name:'06', src: DESIGN_IMAGES['des06'], defaultFontSize:22, defaultColor:'#1a1a1a' },
];

/* 고정값 (회의록 3번: 폰트/사이즈/굵기/위치/배경 모두 고정) */
const FIXED_FONT = 'Noto Sans KR';
const FIXED_FONT_SIZE = 35;
const FIXED_FONT_WEIGHT = 700;
const STRETCH_PX = 40;
const BOTTOM_PAD_PX = 30;

const COLORS = [
  {n:'검정',v:'#1a1a1a'},{n:'흰색',v:'#ffffff'},{n:'빨강',v:'#CC0000'},{n:'파랑',v:'#003399'},
  {n:'노랑',v:'#FFD700'},{n:'초록',v:'#006633'},{n:'주황',v:'#FF6600'},{n:'갈색',v:'#663300'},
];

/* ───── 상태 ───── */
let selectedDesign = null;
let currentColor = '#1a1a1a';
let loadedImages = {};

/* ───── URL 파라미터 파싱 (4번: 주문-시안 자동 매칭) ───── */
const urlParams = new URLSearchParams(window.location.search);
const ORDER_CODE = urlParams.get('order_code') || '';
const PARAM_DESIGN = urlParams.get('design') || '';
const PARAM_CHANNEL = urlParams.get('channel') || '';
const PARAM_NAME = urlParams.get('name') || '';
const PARAM_PHONE = urlParams.get('phone') || '';
const IS_AUTO_MODE = !!ORDER_CODE;

/* ───── 이미지 프리로드 ───── */
function preloadImages(designList) {
  return Promise.all(designList.map(d => new Promise(r => {
    const img = new Image();
    img.onload = () => { loadedImages[d.id] = img; r(); };
    img.onerror = () => r();
    img.src = d.src;
  })));
}

/* ───── 캔버스 렌더링 (간소화: 고정값 사용) ───── */
function renderDesign(canvas, des, mainText, textColor) {
  const img = loadedImages[des.id];
  if (!img) return;

  const iw = img.naturalWidth;
  const ih = img.naturalHeight;
  const lastOpaqueY = 939;
  const stretchH = Math.round(ih * (STRETCH_PX / 1000));
  const bottomPad = Math.round(ih * (BOTTOM_PAD_PX / 1000));
  const cropH = lastOpaqueY + 1;
  const totalH = cropH + stretchH + bottomPad;

  canvas.width = iw;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, iw, totalH);
  ctx.drawImage(img, 0, 0, iw, cropH, 0, 0, iw, cropH);

  for (let y = 0; y < stretchH; y++) {
    ctx.drawImage(img, 0, lastOpaqueY, iw, 1, 0, cropH + y, iw, 1);
  }

  const textCenterY = cropH + stretchH * 0.15;
  const hasText = mainText && mainText.trim();

  if (!hasText) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.font = `500 ${Math.round(stretchH * 0.45)}px "Noto Sans KR",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('상호/기관명', iw * 0.5, textCenterY);
  } else {
    const scaledFS = Math.round(FIXED_FONT_SIZE * (iw / 1000));
    ctx.font = `${FIXED_FONT_WEIGHT} ${scaledFS}px "${FIXED_FONT}",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textColor || des.defaultColor;
    ctx.fillText(mainText, iw * 0.5, textCenterY, iw * 0.85);
  }
}

/* ───── 시안 바 초기화 ───── */
function initDesignBar(designList) {
  const bar = document.getElementById('designBar');
  const wrap = document.getElementById('designBarWrap');
  bar.innerHTML = '';

  if (designList.length === 1) {
    wrap.classList.add('single-mode');
  }

  designList.forEach(d => {
    const thumb = document.createElement('div');
    thumb.className = 'design-thumb' + (d.id === selectedDesign.id ? ' selected' : '');
    thumb.dataset.id = d.id;
    thumb.innerHTML = `<img src="${DESIGN_IMAGES[d.id]}"><div class="label">${d.name}</div>`;

    if (designList.length > 1) {
      thumb.addEventListener('click', () => {
        selectedDesign = d;
        currentColor = d.defaultColor;
        document.querySelectorAll('.design-thumb').forEach(el => el.classList.toggle('selected', el.dataset.id === d.id));
        document.querySelectorAll('.color-chip').forEach(e => e.classList.toggle('sel', e.dataset.c === currentColor));
        updateEditor();
      });
    }
    bar.appendChild(thumb);
  });
}

/* ───── 색상 팔레트 ───── */
function initColorRow() {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (c.v === currentColor ? ' sel' : '');
    chip.style.background = c.v;
    if (c.v === '#ffffff') chip.style.borderColor = '#bbb';
    chip.title = c.n;
    chip.dataset.c = c.v;
    chip.addEventListener('click', () => {
      currentColor = c.v;
      document.querySelectorAll('#colorRow .color-chip').forEach(e => e.classList.toggle('sel', e.dataset.c === c.v));
      updateEditor();
    });
    row.appendChild(chip);
  });
}

/* ───── 에디터 업데이트 ───── */
function updateEditor() {
  if (!selectedDesign) return;
  const text = document.getElementById('inputText').value;
  renderDesign(document.getElementById('editorCanvas'), selectedDesign, text, currentColor);
}

/* ───── 발송 처리 ───── */
function submitOrder() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    alert('상호/기관명을 입력해주세요.');
    document.getElementById('inputText').focus();
    return;
  }

  let orderName, phone, channel;

  if (IS_AUTO_MODE) {
    orderName = PARAM_NAME || '(자동매칭)';
    phone = PARAM_PHONE || '(자동매칭)';
    channel = PARAM_CHANNEL || '(자동매칭)';
  } else {
    orderName = document.getElementById('nameInput').value.trim();
    if (!orderName) {
      alert('주문자명을 입력해주세요.');
      document.getElementById('nameInput').focus();
      return;
    }
    phone = document.getElementById('phoneInput').value.trim();
    if (!phone) {
      alert('연락처를 입력해주세요.');
      document.getElementById('phoneInput').focus();
      return;
    }
    channel = document.querySelector('input[name="orderChannel"]:checked').value;
  }

  const canvas = document.getElementById('editorCanvas');
  const imgData = canvas.toDataURL('image/png');

  const payload = {
    order_code: ORDER_CODE || null,
    design: selectedDesign.name,
    design_id: selectedDesign.id,
    text: text,
    color: currentColor,
    channel: channel,
    orderName: orderName,
    phone: phone,
    imageSize: Math.round(imgData.length / 1024) + 'KB',
    timestamp: new Date().toISOString()
  };

  // TODO: 서버 발송 연동
  console.log('[발송 데이터]', payload);

  // 완료 화면 표시
  document.getElementById('editorCard').querySelectorAll('.canvas-section, .input-section, .divider, .order-section').forEach(el => el.style.display = 'none');
  const complete = document.getElementById('completeScreen');
  complete.style.display = 'block';
  document.getElementById('completeMsg').innerHTML =
    `시안 <strong>${selectedDesign.name}</strong>번 / 상호명 <strong>${text}</strong><br>` +
    (IS_AUTO_MODE ? `주문코드 <strong>${ORDER_CODE}</strong>로 자동 연결되었습니다.` : `주문자 <strong>${orderName}</strong> / 연락처 <strong>${phone}</strong>`);

  alert('시안이 발송되었습니다.');
}

/* ───── 자동매칭 모드 설정 (4번) ───── */
function setupAutoMode() {
  if (!IS_AUTO_MODE) return;

  // 주문코드 바 표시
  document.getElementById('orderInfoBar').style.display = 'block';
  document.getElementById('orderCodeDisplay').textContent = ORDER_CODE;

  // 헤더 문구 변경
  document.getElementById('headerDesc').textContent = '상호/기관명을 입력하고 색상을 선택해주세요';

  // 자동매칭 안내 표시
  document.getElementById('autoMatchInfo').style.display = 'block';

  // 주문처/주문자명/연락처 숨김
  document.getElementById('channelRow').style.display = 'none';

  if (PARAM_NAME) {
    document.getElementById('nameInput').value = PARAM_NAME;
    document.getElementById('nameInput').disabled = true;
  } else {
    document.getElementById('nameRow').style.display = 'none';
  }

  if (PARAM_PHONE) {
    document.getElementById('phoneInput').value = PARAM_PHONE;
    document.getElementById('phoneInput').disabled = true;
  } else {
    document.getElementById('phoneRow').style.display = 'none';
  }

  // 주문처 자동 선택
  if (PARAM_CHANNEL) {
    const radio = document.querySelector(`input[name="orderChannel"][value="${PARAM_CHANNEL}"]`);
    if (radio) radio.checked = true;
  }
}

/* ───── 초기화 ───── */
document.addEventListener('DOMContentLoaded', async () => {

  // 4번: 특정 시안만 불러오기 (파라미터 있을 때)
  let activeDesigns = DESIGNS;
  if (PARAM_DESIGN) {
    const match = DESIGNS.filter(d => d.id === PARAM_DESIGN);
    if (match.length > 0) activeDesigns = match;
  }

  selectedDesign = activeDesigns[0];
  currentColor = selectedDesign.defaultColor;

  await preloadImages(activeDesigns);
  initDesignBar(activeDesigns);
  initColorRow();
  setupAutoMode();

  // 이벤트
  document.getElementById('inputText').addEventListener('input', updateEditor);
  document.getElementById('btnSubmit').addEventListener('click', submitOrder);

  updateEditor();
  setTimeout(() => document.getElementById('inputText').focus(), 200);
});
</script>
</body>
</html>
